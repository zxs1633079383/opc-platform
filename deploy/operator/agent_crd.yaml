apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.opc.zlc.ai
spec:
  group: opc.zlc.ai
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                type:
                  type: string
                  enum: [openclaw, claude-code, codex, cursor, openai, custom]
                replicas:
                  type: integer
                  minimum: 1
                  default: 1
                runtime:
                  type: object
                  properties:
                    model:
                      type: object
                      properties:
                        provider:
                          type: string
                        name:
                          type: string
                        fallback:
                          type: string
                    inference:
                      type: object
                      properties:
                        temperature:
                          type: number
                        maxTokens:
                          type: integer
                    timeout:
                      type: object
                      properties:
                        task:
                          type: string
                        idle:
                          type: string
                        startup:
                          type: string
                resources:
                  type: object
                  properties:
                    tokenBudget:
                      type: object
                      properties:
                        perTask:
                          type: integer
                        perHour:
                          type: integer
                        perDay:
                          type: integer
                    costLimit:
                      type: object
                      properties:
                        perTask:
                          type: string
                        perDay:
                          type: string
                        perMonth:
                          type: string
                context:
                  type: object
                  properties:
                    workdir:
                      type: string
                    skills:
                      type: array
                      items:
                        type: string
                recovery:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    maxRestarts:
                      type: integer
                    restartDelay:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                restarts:
                  type: integer
                message:
                  type: string
                lastUpdated:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Restarts
          type: integer
          jsonPath: .status.restarts
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames:
      - ag
