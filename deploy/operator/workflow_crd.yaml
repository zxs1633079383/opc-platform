apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflows.opc.zlc.ai
spec:
  group: opc.zlc.ai
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                schedule:
                  type: string
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      agent:
                        type: string
                      dependsOn:
                        type: array
                        items:
                          type: string
                      input:
                        type: object
                        properties:
                          message:
                            type: string
                          context:
                            type: array
                            items:
                              type: string
                      outputs:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                lastRun:
                  type: string
                  format: date-time
                runs:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: workflows
    singular: workflow
    kind: Workflow
    shortNames:
      - wf
