replicaCount: 1

image:
  repository: zlcai/opc-platform
  pullPolicy: IfNotPresent
  tag: "0.3.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 9527

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: opc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

storage:
  type: sqlite
  sqlite:
    path: /data/opc.db
  postgres:
    dsn: ""

auth:
  enabled: false
  jwtSecret: ""

gateway:
  telegram:
    enabled: false
    token: ""
  discord:
    enabled: false
    token: ""

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
