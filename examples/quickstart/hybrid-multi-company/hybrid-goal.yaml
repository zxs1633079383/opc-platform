# Hybrid Goal Example
# Develops a messaging system using both Claude and OpenClaw agents

apiVersion: opc/v1
kind: Goal
metadata:
  name: messaging-system
  federation: tech-group
spec:
  description: |
    Develop and deploy an enterprise messaging system.
    This goal will be automatically decomposed across companies.
  
  targetCompanies:
    - software
    - operations
    - sales
  
  deadline: 2026-04-30
  
  # High-level requirements (AI will decompose into tasks)
  requirements:
    - Real-time messaging with WebSocket
    - User authentication and authorization
    - Message history and search
    - File attachments support
    - Deployment to cloud
    - User documentation
  
  # Approval gates for human oversight
  approvalGates:
    - afterProject: software-core
      reason: Code review before deployment
    - afterTask: production-deploy
      reason: Verify staging success
  
  # Context to inject across companies
  sharedContext:
    projectName: enterprise-messenger
    techStack:
      backend: Go
      frontend: React
      database: PostgreSQL
    designDocs: /shared/docs/messenger-design.md

---
