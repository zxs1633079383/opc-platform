apiVersion: opc/v1
kind: Goal
metadata:
  name: develop-messaging-system
  labels:
    priority: high
    product: messaging
spec:
  description: |
    Build an enterprise-grade real-time messaging system with backend API,
    web frontend, infrastructure automation, and go-to-market materials.
  deadline: 2026-04-30
  targetCompanies:
    - software
    - operations
    - sales

  decomposition:
    projects:
      - name: backend-api
        company: software
        description: "Design and implement messaging REST API with WebSocket support"
        tasks:
          - name: design-api-schema
            description: "Create OpenAPI spec for messaging endpoints"
            assignAgent: backend-dev
            issues:
              - name: create-openapi-spec
                description: "Draft OpenAPI 3.0 spec with channels, messages, and users"
              - name: design-database-schema
                description: "Design PostgreSQL schema for messages, channels, and users"
          - name: implement-endpoints
            description: "Build REST and WebSocket endpoints"
            dependsOn: [design-api-schema]
            assignAgent: backend-dev
            issues:
              - name: build-rest-api
                description: "Implement CRUD endpoints for channels and messages"
              - name: build-websocket-handler
                description: "Implement real-time message delivery via WebSocket"

      - name: web-frontend
        company: software
        description: "Build responsive web UI for the messaging system"
        tasks:
          - name: build-ui-components
            description: "Create React components for chat interface"
            assignAgent: frontend-dev
            issues:
              - name: create-chat-ui
                description: "Build message list, input box, and channel sidebar"
              - name: integrate-websocket
                description: "Connect frontend to WebSocket for real-time updates"

      - name: infrastructure
        company: operations
        description: "Set up CI/CD, deployment, and monitoring"
        tasks:
          - name: setup-ci-cd
            description: "Configure build and deployment pipeline"
            assignAgent: devops
            issues:
              - name: configure-pipeline
                description: "Create GitHub Actions workflow for build, test, deploy"
              - name: create-docker-compose
                description: "Write docker-compose for local development environment"
          - name: monitoring-setup
            description: "Configure observability stack"
            assignAgent: monitor
            issues:
              - name: add-dashboards
                description: "Create Grafana dashboards for API latency and error rates"
              - name: configure-alerts
                description: "Set up PagerDuty alerts for SLA breaches"

      - name: go-to-market
        company: sales
        description: "Prepare sales and marketing materials"
        tasks:
          - name: market-research
            description: "Analyze competitor messaging products"
            assignAgent: researcher
            issues:
              - name: competitive-analysis
                description: "Research Slack, Teams, Discord — pricing, features, gaps"
          - name: sales-materials
            description: "Create sales enablement content"
            dependsOn: [market-research]
            assignAgent: content-writer
            issues:
              - name: create-pitch-deck
                description: "Build 10-slide pitch deck highlighting differentiators"
              - name: write-product-brief
                description: "Write one-page product brief for sales team"

  intervention:
    gates:
      - name: api-design-review
        trigger: "project:backend-api/task:design-api-schema completed"
        action: require-approval
        description: "Human review of API schema before implementation begins"
      - name: go-live-approval
        trigger: "all projects completed"
        action: require-approval
        description: "Final human approval before production deployment"
