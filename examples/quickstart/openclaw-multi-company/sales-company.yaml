apiVersion: opc/v1
kind: Company
metadata:
  name: sales
  labels:
    department: go-to-market
spec:
  type: sales
  endpoint: http://localhost:9529
  agents:
    - name: researcher
      type: openclaw
      runtime:
        model:
          provider: anthropic
          name: claude-sonnet-4
          fallback: claude-haiku-4
        inference:
          thinking: high
          temperature: 0.8
          maxTokens: 16384
        timeout:
          task: 600s
          idle: 1200s
      resources:
        tokenBudget:
          perTask: 200000
          perDay: 4000000
        costLimit:
          perTask: "$2"
          perDay: "$40"
        onExceed: pause
      context:
        workdir: /workspace/market-research
        skills:
          - web-research
          - competitive-analysis
          - report-writing

    - name: content-writer
      type: openclaw
      runtime:
        model:
          provider: anthropic
          name: claude-sonnet-4
        inference:
          thinking: medium
          temperature: 0.9
          maxTokens: 16384
        timeout:
          task: 600s
          idle: 1200s
      resources:
        tokenBudget:
          perTask: 150000
          perDay: 3000000
        costLimit:
          perTask: "$1.50"
          perDay: "$30"
        onExceed: pause
      context:
        workdir: /workspace/content
        skills:
          - copywriting
          - pitch-deck
          - documentation
