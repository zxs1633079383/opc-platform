apiVersion: opc/v1
kind: Company
metadata:
  name: operations
  labels:
    department: infrastructure
spec:
  type: operations
  endpoint: http://localhost:9528
  agents:
    - name: devops
      type: openclaw
      runtime:
        model:
          provider: anthropic
          name: claude-sonnet-4
          fallback: claude-haiku-4
        inference:
          thinking: medium
          temperature: 0.5
          maxTokens: 12288
        timeout:
          task: 900s
          idle: 1800s
      resources:
        tokenBudget:
          perTask: 150000
          perDay: 3000000
        costLimit:
          perTask: "$1.50"
          perDay: "$30"
        onExceed: pause
      context:
        workdir: /workspace/infrastructure
        skills:
          - ci-cd-pipeline
          - docker-compose
          - kubernetes-deploy

    - name: monitor
      type: openclaw
      runtime:
        model:
          provider: anthropic
          name: claude-haiku-4
        inference:
          thinking: low
          temperature: 0.3
          maxTokens: 8192
        timeout:
          task: 300s
          idle: 600s
      resources:
        tokenBudget:
          perTask: 50000
          perDay: 1000000
        costLimit:
          perTask: "$0.50"
          perDay: "$10"
        onExceed: alert
      context:
        workdir: /workspace/monitoring
        skills:
          - alerting-rules
          - dashboard-creation
          - log-analysis
