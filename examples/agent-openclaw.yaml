apiVersion: opc/v1
kind: AgentSpec
metadata:
  name: code-reviewer
  labels:
    role: reviewer
    project: opc-platform
spec:
  type: openclaw
  replicas: 1
  runtime:
    model:
      provider: anthropic
      name: claude-sonnet-4
      fallback: claude-haiku-4
    inference:
      thinking: low
      temperature: 0.7
      maxTokens: 8192
    timeout:
      task: 300s
      idle: 600s
      startup: 30s
  resources:
    tokenBudget:
      perTask: 100000
      perHour: 500000
      perDay: 2000000
    costLimit:
      perTask: "$1"
      perDay: "$20"
      perMonth: "$500"
    onExceed: pause
  context:
    workdir: /workspace/opc-platform
    skills:
      - code-review
      - git-operations
  healthCheck:
    type: heartbeat
    interval: 60s
    timeout: 10s
    retries: 3
  recovery:
    enabled: true
    maxRestarts: 5
    restartDelay: 10s
    backoff: exponential
