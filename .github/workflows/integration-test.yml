name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'

      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate protobuf code
        run: make proto

      - name: Run unit tests
        run: go test ./... -count=1 -timeout 120s

  grpc-integration-tests:
    name: gRPC Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'

      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate protobuf code
        run: make proto

      - name: Run gRPC integration tests
        run: go test -tags=integration ./test/integration/ -v -count=1 -timeout 120s

  integration-tests:
    name: Integration Tests (Mock Mode)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'

      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate protobuf code
        run: make proto

      - name: Build opctl
        run: go build -o opctl ./cmd/opctl

      - name: Create mock Claude Code script
        run: |
          mkdir -p /tmp/opc-mock
          cat > /tmp/opc-mock/claude <<'MOCKEOF'
          #!/bin/bash
          # Mock Claude Code CLI — returns JSON result for --print mode.
          if echo "$@" | grep -q "\-\-print"; then
            echo '{"type":"result","subtype":"success","result":"Mock implementation completed successfully.","cost_usd":0.0012,"duration_ms":500,"duration_api_ms":400,"num_turns":1,"session_id":"mock-session","is_error":false,"total_cost_usd":0.0012,"usage":{"input_tokens":150,"output_tokens":50,"cache_creation_input_tokens":0,"cache_read_input_tokens":0}}'
          else
            echo "Mock Claude Code (non-print mode)"
          fi
          MOCKEOF
          chmod +x /tmp/opc-mock/claude

      - name: Create mock OpenClaw Gateway
        run: |
          cat > /tmp/opc-mock/mock_openclaw_gw.go <<'GWEOF'
          package main

          import (
            "encoding/json"
            "fmt"
            "log"
            "net/http"

            "github.com/gorilla/websocket"
          )

          var upgrader = websocket.Upgrader{CheckOrigin: func(r *http.Request) bool { return true }}

          func handler(w http.ResponseWriter, r *http.Request) {
            conn, err := upgrader.Upgrade(w, r, nil)
            if err != nil {
              log.Println("upgrade:", err)
              return
            }
            defer conn.Close()
            for {
              _, msg, err := conn.ReadMessage()
              if err != nil {
                break
              }
              var req map[string]interface{}
              json.Unmarshal(msg, &req)
              id := req["id"]
              method, _ := req["method"].(string)
              var result interface{}
              switch method {
              case "authenticate":
                result = map[string]interface{}{"authenticated": true}
              case "agent":
                result = map[string]interface{}{"runId": "mock-run-001"}
              case "agent.wait":
                result = map[string]interface{}{
                  "text": "Mock OpenClaw result completed.",
                  "tokensIn": 100, "tokensOut": 50, "cost": 0.001,
                }
              default:
                result = map[string]interface{}{"ok": true}
              }
              resp := map[string]interface{}{"jsonrpc": "2.0", "id": id, "result": result}
              data, _ := json.Marshal(resp)
              conn.WriteMessage(websocket.TextMessage, data)
            }
          }

          func main() {
            http.HandleFunc("/ws", handler)
            fmt.Println("Mock OpenClaw Gateway on :18789")
            log.Fatal(http.ListenAndServe(":18789", nil))
          }
          GWEOF

      - name: Start Master OPC (port 9527)
        run: |
          export PATH="/tmp/opc-mock:$PATH"
          ./opctl daemon --port 9527 --host 0.0.0.0 &
          sleep 2

      - name: Run Scenario 1 — Local Goal x Claude Code
        run: |
          # Register a Claude Code agent.
          curl -sf -X POST http://localhost:9527/api/apply \
            -H 'Content-Type: application/x-yaml' \
            -d 'apiVersion: opc/v1
          kind: AgentSpec
          metadata:
            name: cc-test
          spec:
            type: claude-code
            runtime:
              model: { name: claude-sonnet-4 }
              timeout: { task: 60s }
            context:
              workdir: /tmp/opc-test'

          # Start agent.
          curl -sf -X POST http://localhost:9527/api/agents/cc-test/start

          # Create a local goal with autoDecompose.
          GOAL_RESP=$(curl -sf -X POST http://localhost:9527/api/goals \
            -H 'Content-Type: application/json' \
            -d '{"name":"CI Test Goal","description":"Say hello world","autoDecompose":true}')
          echo "Goal response: $GOAL_RESP"
          GOAL_ID=$(echo "$GOAL_RESP" | jq -r '.id')
          echo "Goal ID: $GOAL_ID"

          # Poll for completion (max 60s).
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(curl -sf http://localhost:9527/api/goals/$GOAL_ID | jq -r '.status')
            echo "Poll $i: status=$STATUS"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              break
            fi
          done

          FINAL=$(curl -sf http://localhost:9527/api/goals/$GOAL_ID | jq -r '.status')
          echo "Final status: $FINAL"
          if [ "$FINAL" != "completed" ]; then
            echo "WARN: Goal did not complete (status: $FINAL), but mock env may not fully support execution"
          fi

      - name: Verify API Health
        run: |
          curl -sf http://localhost:9527/api/health | jq .

      - name: Verify Agents Registered
        run: |
          AGENTS=$(curl -sf http://localhost:9527/api/agents | jq length)
          echo "Registered agents: $AGENTS"
          if [ "$AGENTS" -lt 1 ]; then
            echo "FAIL: No agents registered"
            exit 1
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            ~/.opc/logs/
            /tmp/opc-test/
          retention-days: 7
