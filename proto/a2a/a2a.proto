syntax = "proto3";
package a2a;
option go_package = "github.com/zlc-ai/opc-platform/gen/a2a";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

enum TaskState {
  TASK_STATE_UNSPECIFIED  = 0;
  TASK_STATE_SUBMITTED    = 1;
  TASK_STATE_WORKING      = 2;
  TASK_STATE_INPUT_REQUIRED = 3;
  TASK_STATE_COMPLETED    = 4;
  TASK_STATE_FAILED       = 5;
  TASK_STATE_CANCELED     = 6;
}

message TextPart {
  string text = 1;
}

message FilePart {
  string name      = 1;
  string mime_type = 2;
  oneof content {
    bytes bytes  = 3;
    string uri   = 4;
  }
}

message DataPart {
  string mime_type             = 1;
  google.protobuf.Struct data  = 2;
}

message Part {
  oneof part {
    TextPart text_part = 1;
    FilePart file_part = 2;
    DataPart data_part = 3;
  }
}

message Message {
  string                     role      = 1;
  repeated Part              parts     = 2;
  google.protobuf.Timestamp  timestamp = 3;
}

message Artifact {
  string                id       = 1;
  string                name     = 2;
  repeated Part         parts    = 3;
  map<string, string>   metadata = 4;
}

message TaskStatus {
  TaskState                   state     = 1;
  string                      reason    = 2;
  google.protobuf.Timestamp   timestamp = 3;
}

message Task {
  string                id         = 1;
  string                session_id = 2;
  TaskStatus            status     = 3;
  repeated Message      messages   = 4;
  repeated Artifact     artifacts  = 5;
  map<string, string>   metadata   = 6;
}

message AgentSkill {
  string          id          = 1;
  string          name        = 2;
  string          description = 3;
  repeated string tags        = 4;
  repeated string examples    = 5;
}

message AgentCard {
  string                name         = 1;
  string                description  = 2;
  string                url          = 3;
  string                version      = 4;
  string                provider     = 5;
  repeated AgentSkill   skills       = 6;
  repeated string       input_modes  = 7;
  repeated string       output_modes = 8;
  map<string, string>   metadata     = 9;
}
